[server]
headless = true
enableCORS = false
# XSRF must be off behind a reverse proxy (Render, HF Spaces, etc.) — the
# proxy rewrites cookies and Streamlit's CSRF check rejects file uploads
# with HTTP 400. Safe for a single-user demo where the only "action" is
# uploading a PDF you chose yourself.
enableXsrfProtection = false
maxUploadSize = 50

[browser]
gatherUsageStats = false

[theme]
base = "light"
primaryColor = "#2E86AB"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F4F6F8"
textColor = "#1F2937"
font = "sans serif"
